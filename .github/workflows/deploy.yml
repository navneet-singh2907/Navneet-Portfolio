name: Build and Deploy Portfolio

on:
  push:
    branches:
      - main  # Triggers the deployment every time you push to the main branch

jobs:
  web-deploy:
    name: Production Deploy
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
    
    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🏗️ Build Vite Project
      run: npm run build
      
    - name: 🚀 Sync Files to Hostinger via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/          # It takes the compiled files from here...
        server-dir: ./public_html/  # ...and puts them straight into your live root folder!